name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build Go Backend
      # Build the daemon. The output must be in the root so electron-builder can find it via ../RemoteKnown-daemon.exe
      # 从 git tag 注入版本号（去掉前缀 v），作为检测规则 minAppVersion 门槛的当前版本
      shell: bash
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        echo "Injecting daemon version: ${VERSION}"
        go mod tidy
        go build -ldflags="-s -w -H windowsgui -X RemoteKnown/internal/version.Version=${VERSION}" -o RemoteKnown-daemon.exe ./cmd/main.go
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        
    - name: Install Frontend Dependencies
      working-directory: ./web
      run: npm install

    - name: Build Electron App
      working-directory: ./web
      run: npm run build:win
      # info: electron-builder might try to publish automatically if GH_TOKEN is present, 
      # but we will use specific release action step for better control.
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        # 含连字符的 tag 视为预发布（如 v1.0.7-beta.1）：标记为 Pre-release 且不设为 Latest，
        # 正式 tag（如 v1.0.7）才标记 Latest。GitHub 的 /releases/latest 会自动跳过预发布，
        # 因此 App 内的“检查更新”不会把 beta 推送给用户。
        prerelease: ${{ contains(github.ref_name, '-') }}
        make_latest: ${{ !contains(github.ref_name, '-') }}
        # Upload the installer exe found in web/dist
        files: |
          web/dist/*.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
